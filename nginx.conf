worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript;

    # Upstream ФинСоветник
    upstream finsovetnik {
        server finsovetnik-nginx:80;
    }

    # Upstream Resume AI (внутренний порт Resume AI nginx)
    upstream resume_ai {
        server resume-ai-app:80;
    }

    # ФинСоветник - HTTP → HTTPS
    server {
        listen 80;
        server_name finsovetnik-ai.ru www.finsovetnik-ai.ru;
        return 301 https://$host$request_uri;
    }

    # ФинСоветник - HTTPS
    server {
        listen 443 ssl http2;
        server_name finsovetnik-ai.ru www.finsovetnik-ai.ru;

        ssl_certificate /etc/nginx/ssl/finsovetnik/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/finsovetnik/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;

        location / {
            proxy_pass http://finsovetnik;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /ws {
            proxy_pass http://finsovetnik;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }

    # Resume AI - HTTP → HTTPS
    server {
        listen 80;
        server_name ai-hr-assistent.ru www.ai-hr-assistent.ru;
        return 301 https://$host$request_uri;
    }

    # Resume AI - HTTPS
    server {
        listen 443 ssl http2;
        server_name ai-hr-assistent.ru www.ai-hr-assistent.ru;

        ssl_certificate /etc/nginx/ssl/resume_ai/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/resume_ai/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;

        location / {
            proxy_pass http://resume_ai;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}