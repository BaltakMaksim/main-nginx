version: '3.8'

services:
  nginx:
    image: nginx:alpine
    container_name: main-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
      - ./logs:/var/log/nginx
    networks:
      - main-network

networks:
  main-network:
    external: true
    name: finsovetnik_finsovetnik-network